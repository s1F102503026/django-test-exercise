<h1>Edit task</h1>

<form method="post">
    {% csrf_token %}

    <p>Title</p>
    <input type="text" name="title" value="{{ task.title }}">

    <p>Due at</p>
    <input type="datetime-local" name="due_at" value="{{ task.due_at|date:'Y-m-d\TH:i' }}">

    <button type="submit">Submit</button>
</form>
